events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    include /etc/nginx/conf.d/includes/limits.conf;
    include /etc/nginx/conf.d/includes/rate-limit-zones.conf;
    include /etc/nginx/conf.d/includes/security-maps.conf;
    include /etc/nginx/conf.d/app.conf;
}
