# Rate limiting — zones definidas no bloco http
limit_req_zone $binary_remote_addr zone=api_general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth_sensitive:10m rate=20r/m;
# Geocoding e rotas — mapa dispara várias requisições (busca, rota-frete, recálculo GPS)
limit_req_zone $binary_remote_addr zone=mapbox_api:10m rate=120r/m;
# Telemetria do motorista (~1 req a cada 5s por sessão ativa)
limit_req_zone $binary_remote_addr zone=mapbox_telemetry:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=upload_api:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
