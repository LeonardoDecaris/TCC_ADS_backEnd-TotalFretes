# Rate limiting — zones definidas no bloco http
limit_req_zone $binary_remote_addr zone=api_general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth_sensitive:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=mapbox_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload_api:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
