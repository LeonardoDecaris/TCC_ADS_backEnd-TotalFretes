# Validação de métodos HTTP permitidos
map $request_method $allowed_method {
    default 0;
    GET     1;
    HEAD    1;
    POST    1;
    PUT     1;
    PATCH   1;
    DELETE  1;
    OPTIONS 1;
}

# CSP relaxada para Swagger UI; demais rotas recebem policy restritiva para API JSON
map $request_uri $csp_header {
    default "default-src 'none'; frame-ancestors 'none'";
    ~^/api-docs  "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;";
    ~^/swagger-ui "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;";
    ~^/docs       "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;";
}
