# API Gateway - Padrão: todas as rotas sob /api. ^~ = prioridade sobre location /
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    include /etc/nginx/conf.d/includes/security-headers-dev.conf;

    limit_req zone=api_general burst=100 nodelay;
    limit_conn conn_per_ip 50;
    limit_req_status 429;
    limit_conn_status 429;
    error_page 429 = @rate_limit_exceeded;

    if ($allowed_method = 0) {
        return 405;
    }

    location @rate_limit_exceeded {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","status":429,"message":"Limite de requisições excedido. Tente novamente em instantes.","timestamp":"$date_gmt"}';
    }

    location ~ /\. {
        deny all;
    }

    # ========== AUTH (authentication-service) - ^~ evita fallback para root ==========
    location ^~ /api/auth {
        limit_req zone=auth_sensitive burst=10 nodelay;
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://authentication-service:3000/auth;
    }

    location ^~ /api/account {
        limit_req zone=auth_sensitive burst=10 nodelay;
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://authentication-service:3000/account;
    }

    # ========== USER (user-service) ==========
    location /api/user {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://user-service:3001/user;
    }

    location /api/cnh {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://user-service:3001/cnh;
    }

    location /api/group-vehicle-type {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://user-service:3001/group-vehicle-type;
    }

    location /api/vehicle-type {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://user-service:3001/vehicle-type;
    }

    location /api/vehicle {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://user-service:3001/vehicle;
    }

    # ========== COMPANY (company-service) ==========
    location /api/company {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://company-service:3002/company;
    }

    location /api/address {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://company-service:3002/address;
    }

    # ========== EMAIL ==========
    # Apenas health público; envio de e-mail é via RabbitMQ (sem POST HTTP direto).
    location /api/email/ {
        limit_except GET HEAD {
            deny all;
        }
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://email-management-service:3003/;
    }

    # ========== MAPBOX ==========
    location /api/mapbox/ {
        limit_req zone=mapbox_api burst=5 nodelay;
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://mapbox-service:3004/api/;
    }

    # ========== FREIGHT ==========
    location /api/freight/ {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/freight/;
    }

    location /api/cargo-type {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/cargo-type;
    }

    location /api/freight-status-type {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/freight-status-type;
    }

    location /api/freight {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/freight;
    }

    location /api/proposal-status-type {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/proposal-status-type;
    }

    location /api/proposal {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://freight-service:3008/proposal;
    }

    # ========== DOCS SWAGGER-UI ==========
    location /api-docs/ {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://swagger-service:3005/;
    }

    location /swagger-ui/ {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://swagger-service:3005/swagger-ui/;
    }

    location = /docs {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://swagger-service:3005/docs;
    }

    location /storage {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://storage-service:3007/;
    }

    # ========== STORAGE (upload) - compatível com /api/user-images e /api/user-images/... ==========
    location = /api/user-images {
        limit_req zone=upload_api burst=3 nodelay;
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://storage-service:3007/user-images;
        client_max_body_size 6M;
    }

    location ^~ /api/user-images/ {
        limit_req zone=upload_api burst=3 nodelay;
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://storage-service:3007/user-images/;
        client_max_body_size 6M;
    }

    # ========== STORAGE - servir arquivos com /api/uploads e /api/uploads/... ==========
    location = /api/uploads {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://storage-service:3007/uploads;
    }

    location ^~ /api/uploads/ {
        include /etc/nginx/conf.d/includes/proxy-common.conf;
        proxy_pass http://storage-service:3007/uploads/;
    }

    # ========== FALLBACK ==========
    location / {
        default_type application/json;
        return 404 '{"error":"Not Found","status":404,"message":"Rota não encontrada. Use /api/auth, /api/user, /api/company, /api/cnh, /api/address, /api/email, /api/mapbox, /api/i18n-translation, /api/group-vehicle-type, /api/vehicle-type, /api/vehicle, /api/user-images, /storage, /api/freight, /api/cargo-type, /api/freight-status-type, /api/proposal, /api/proposal-status-type ou /api-docs","timestamp":"$date_gmt"}';
    }
}
