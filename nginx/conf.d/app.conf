# Resolver do Docker: resolve hostnames no momento da requisição (evita "host not found" quando Nginx sobe antes dos outros containers)
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    location /api/authentication {
        set $backend "authentication-service:3000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/user {
        set $backend "user-service:3001";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/company {
