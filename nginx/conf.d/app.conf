# API Gateway - Padrão: todas as rotas sob /api. ^~ = prioridade sobre location /
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ========== AUTH (authentication-service) - ^~ evita fallback para root ==========
    location ^~ /api/auth {
        proxy_pass http://authentication-service:3000/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location ^~ /api/account {
        proxy_pass http://authentication-service:3000/account;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== USER (user-service) ==========
    location /api/user {
        proxy_pass http://user-service:3001/user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location /api/cnh {
        proxy_pass http://user-service:3001/cnh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location /api/group-vehicle-type {
        proxy_pass http://user-service:3001/group-vehicle-type;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location /api/vehicle-type {
        proxy_pass http://user-service:3001/vehicle-type;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location /api/vehicle {
        proxy_pass http://user-service:3001/vehicle;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== COMPANY (company-service) ==========
    location /api/company {
        proxy_pass http://company-service:3002/company;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    location /api/address {
        proxy_pass http://company-service:3002/address;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== EMAIL ==========
    location /api/email/ {
        proxy_pass http://email-management-service:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== MAPBOX ==========
    location /api/mapbox/ {
        proxy_pass http://mapbox-service:3004/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== I18N ==========
    location /api/i18n-translation/ {
        proxy_pass http://i18n-translation-service:3006/i18n/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ========== DOCS SWAGGER-UI ==========
    location /api-docs/ {
        proxy_pass http://swagger-service:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /swagger-ui/ {
        proxy_pass http://swagger-service:3005/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location = /docs {
        proxy_pass http://swagger-service:3005/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /storage {
        proxy_pass http://storage-service:3007/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ========== STORAGE (upload) - compatível com /api/user-images e /api/user-images/... ==========
    location = /api/user-images {
        proxy_pass http://storage-service:3007/user-images;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 6M;
    }

    location ^~ /api/user-images/ {
        proxy_pass http://storage-service:3007/user-images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 6M;
    }

    # ========== STORAGE - servir arquivos com /api/uploads e /api/uploads/... ==========
    location = /api/uploads {
        proxy_pass http://storage-service:3007/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/uploads/ {
        proxy_pass http://storage-service:3007/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/freight/ {
        proxy_pass http://freight-service:3008/freight/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Locale $http_x_locale;
    }

    # ========== FALLBACK ==========
    location / {
        default_type application/json;
        return 404 '{"error":"Not Found","status":404,"message":"Rota não encontrada. Use /api/auth, /api/user, /api/company, /api/cnh, /api/address, /api/email, /api/mapbox, /api/i18n-translation, /api/group-vehicle-type, /api/vehicle-type, /api/vehicle, /api/user-images, /storage ou /api-docs","timestamp":"$date_gmt"}';
    }
}
