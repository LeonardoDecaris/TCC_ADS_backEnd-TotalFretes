# Override para suite de testes (integração + carga)

# Uso: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --wait



services:

  nginx:

    volumes:

      - ./nginx/nginx.test.conf:/etc/nginx/nginx.conf:ro

      - ./nginx/conf.d:/etc/nginx/conf.d:ro



  authentication-service:

    environment:

      JWT_SECRET: test-jwt-secret-totalfretes-suite

      NODE_ENV: test

      ADMIN_SEED_ENABLED: "true"

      ADMIN_SEED_EMAIL: admin@totalfretes.com.br

      ADMIN_SEED_PASSWORD: Admin@123456
      OTEL_SERVICE_NAME: authentication-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios



  user-service:

    environment:

      JWT_SECRET: test-jwt-secret-totalfretes-suite

      NODE_ENV: test
      OTEL_SERVICE_NAME: user-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios

      INTERNAL_SERVICE_KEY: test-internal-service-key

      DEMO_DATA_SEED_ON_STARTUP: "true"

      DEMO_SEED_DRIVER_PASSWORD: Motorista@123456



  company-service:

    environment:

      JWT_SECRET: test-jwt-secret-totalfretes-suite

      INTERNAL_SERVICE_KEY: test-internal-service-key

      NODE_ENV: test

      DEMO_DATA_SEED_ON_STARTUP: "true"

      DEMO_SEED_PASSWORD: Empresa@123456

      OTEL_SERVICE_NAME: company-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios
      COMPANY_SEED_EMAIL: seed.empresa@demo.totalfretes.com.br
      COMPANY_SEED_PASSWORD: Empresa@123456
    depends_on:

      company-service-database:

        condition: service_healthy

      authentication-service:

        condition: service_healthy

      storage-service:

        condition: service_healthy

    healthcheck:

      start_period: 120s

      retries: 10



  freight-service:

    environment:

      JWT_SECRET: test-jwt-secret-totalfretes-suite

      NODE_ENV: test

      REDIS_URL: redis://redis:6379

      INTERNAL_SERVICE_KEY: test-internal-service-key

      DEMO_DATA_SEED_ON_STARTUP: "true"

      SEED_TEST_DATA: "true"
      SEED_TEST_COMPANY_ID: "1"
      SEED_TEST_DRIVER_IDS: "2,3,4,5"
      OTEL_SERVICE_NAME: freight-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios
    depends_on:

      freight-service-database:

        condition: service_healthy

      redis:

        condition: service_healthy

      storage-service:

        condition: service_healthy

      company-service:

        condition: service_healthy

      user-service:

        condition: service_healthy

    healthcheck:

      start_period: 120s

      retries: 10



  storage-service:

    environment:

      JWT_SECRET: test-jwt-secret-totalfretes-suite

      NODE_ENV: test
      OTEL_SERVICE_NAME: storage-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios

      INTERNAL_SERVICE_KEY: test-internal-service-key

      DEMO_DATA_SEED_ON_STARTUP: "true"



  mapbox-service:

    environment:

      NODE_ENV: test



  swagger-service:

    environment:

      NODE_ENV: test



  email-management-service:

    environment:

      NODE_ENV: test

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      OTEL_SERVICE_NAME: email-management-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,axios
