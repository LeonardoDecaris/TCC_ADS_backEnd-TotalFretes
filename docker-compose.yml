services:
  # ===== AUTHENTICATION SERVICE =====
  authentication-service:
    build:
      context: .
      dockerfile: authentication-service/Dockerfile
    container_name: authentication-service
    restart: always
    env_file:
      - ./authentication-service/.env
    depends_on:
      authentication-service-database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/auth/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 15s
      retries: 8
      start_period: 120s

  authentication-service-database:
    image: mysql:8.0
    container_name: authentication-service-database
    restart: always
    env_file:
      - ./authentication-service/.env
    volumes:
      - authentication-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3306:3306"

  # ===== USER SERVICE =====
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: always
    env_file:
      - ./user-service/.env
    depends_on:
      user-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  user-service-database:
    image: mysql:8.0
    container_name: user-service-database
    restart: always
    env_file:
      - ./user-service/.env
    volumes:
      - user-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3307:3306"

  # ===== COMPANY SERVICE =====
  company-service:
    build:
      context: .
      dockerfile: company-service/Dockerfile
    container_name: company-service
    restart: always
    env_file:
      - ./company-service/.env
    depends_on:
      company-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  company-service-database:
    image: mysql:8.0
    container_name: company-service-database
    restart: always
    env_file:
      - ./company-service/.env
    volumes:
      - company-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3308:3306"

  # ===== STORAGE SERVICE =====
  storage-service:
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    container_name: storage-service
    restart: always
    env_file:
      - ./storage-service/.env
    depends_on:
      storage-service-database:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - storage-service-uploads:/app/uploads
      - ./uploads:/backup/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3007/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  storage-service-database:
    image: mysql:8.0
    container_name: storage-service-database
    restart: always
    env_file:
      - ./storage-service/.env
    volumes:
      - storage-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3309:3306"

  # ===== MESSAGE BROKER & CACHE =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    env_file:
      - .env
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===== AUXILIARY SERVICES =====
  email-management-service:
    build:
      context: .
      dockerfile: email-management-service/Dockerfile
    container_name: email-management-service
    restart: always
    env_file:
      - ./email-management-service/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  mapbox-service:
    build: ./mapbox-service
    container_name: mapbox-service
    restart: always
    env_file:
      - ./mapbox-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  i18n-translation-service:
    build:
      context: .
      dockerfile: i18n-translation-service/Dockerfile
    container_name: i18n-translation-service
    restart: always
    env_file:
      - ./i18n-translation-service/.env
    ports:
      - "3006:3006"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  freight-service:
    build:
      context: .
      dockerfile: freight-service/Dockerfile
    container_name: freight-service
    restart: always
    env_file:
      - ./freight-service/.env
    depends_on:
      freight-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3008/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    
  freight-service-database:
    image: mysql:8.0
    container_name: freight-service-database
    restart: always
    env_file:
      - ./freight-service/.env
    volumes:
      - freight-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3310:3306"

  # ===== API GATEWAY =====
  swagger-service:
    build:
      context: .
      dockerfile: swagger-service/Dockerfile
    container_name: swagger-service
    restart: always
    env_file:
      - ./swagger-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    depends_on:
      authentication-service:
        condition: service_started
      user-service:
        condition: service_started
      company-service:
        condition: service_started
      email-management-service:
        condition: service_started
      mapbox-service:
        condition: service_started
      swagger-service:
        condition: service_started
      i18n-translation-service:
        condition: service_started
      storage-service:
        condition: service_started
      freight-service:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  authentication-service-database-data:
  user-service-database-data:
  company-service-database-data:
  storage-service-database-data:
  storage-service-uploads:
  freight-service-database-data:

networks:
  app-network:
    driver: bridge
