services:

  # ===== CAMADA 1 — INFRA BASE (sem dependências, sobem em paralelo) =====

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:4.0.9-management-alpine
    container_name: rabbitmq
    restart: always
    env_file:
      - .env
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5672 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    restart: on-failure
    user: "0"
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/var/loki
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: on-failure
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: on-failure
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: on-failure
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      cadvisor:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  docker-stats-exporter:
    image: node:22-alpine
    container_name: docker-stats-exporter
    restart: on-failure
    user: "0:0"
    command: ["node", "/app/docker-stats-exporter.mjs"]
    volumes:
      - ./docker/metrics/docker-stats-exporter.mjs:/app/docker-stats-exporter.mjs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9404:9404"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9404/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  authentication-service-database:
    image: mysql:8.4
    container_name: authentication-service-database
    restart: always
    env_file:
      - ./authentication-service/.env
    volumes:
      - authentication-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3306:3306"

  user-service-database:
    image: mysql:8.4
    container_name: user-service-database
    restart: always
    env_file:
      - ./user-service/.env
    volumes:
      - user-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3307:3306"

  company-service-database:
    image: mysql:8.4
    container_name: company-service-database
    restart: always
    env_file:
      - ./company-service/.env
    volumes:
      - company-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3308:3306"

  storage-service-database:
    image: mysql:8.4
    container_name: storage-service-database
    restart: always
    env_file:
      - ./storage-service/.env
    volumes:
      - storage-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3309:3306"

  freight-service-database:
    image: mysql:8.4
    container_name: freight-service-database
    restart: always
    env_file:
      - ./freight-service/.env
    volumes:
      - freight-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3310:3306"

  notification-service-database:
    image: mysql:8.4
    container_name: notification-service-database
    restart: always
    env_file:
      - ./notification-service/.env
    volumes:
      - notification-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3311:3306"

  # ===== CAMADA 2 — OBSERVABILIDADE + SERVIÇOS STATELESS (dependem só de infra) =====

  grafana:
    image: grafana/grafana:11.6.11
    container_name: grafana
    restart: on-failure
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    ports:
      - "3101:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "https://storage.googleapis.com/integration-artifacts/grafana-lokiexplore-app/release/main/any/grafana-lokiexplore-app-main.zip;grafana-lokiexplore-app"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.5.0
    container_name: promtail
    restart: on-failure
    depends_on:
      loki:
        condition: service_started
    ports:
      - "3102:9080"
    volumes:
      - ./docker/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/usr/bin/promtail", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mapbox-service-database:
    image: mysql:8.4
    container_name: mapbox-service-database
    restart: always
    env_file:
      - ./mapbox-service/.env
    volumes:
      - mapbox-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3312:3306"

  mapbox-service:
    build:
      context: .
      dockerfile: mapbox-service/Dockerfile
    container_name: mapbox-service
    restart: always
    env_file:
      - .env
      - ./mapbox-service/.env
    depends_on:
      mapbox-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3004/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  swagger-service:
    build:
      context: .
      dockerfile: swagger-service/Dockerfile
    container_name: swagger-service
    restart: always
    env_file:
      - ./swagger-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3005/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  email-management-service:
    build:
      context: .
      dockerfile: email-management-service/Dockerfile
    container_name: email-management-service
    restart: always
    env_file:
      - ./email-management-service/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ===== CAMADA 3 — SERVIÇOS STATEFUL (dependem de DB próprio + infra) =====

  authentication-service:
    build:
      context: .
      dockerfile: authentication-service/Dockerfile
    container_name: authentication-service
    restart: always
    env_file:
      - ./authentication-service/.env
    depends_on:
      authentication-service-database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/auth/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: always
    env_file:
      - .env
      - ./user-service/.env
    depends_on:
      user-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  company-service:
    build:
      context: .
      dockerfile: company-service/Dockerfile
    container_name: company-service
    restart: always
    env_file:
      - .env
      - ./company-service/.env
    depends_on:
      company-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  storage-service:
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    container_name: storage-service
    restart: always
    env_file:
      - .env
      - ./storage-service/.env
    depends_on:
      storage-service-database:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3007/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  freight-service:
    build:
      context: .
      dockerfile: freight-service/Dockerfile
    container_name: freight-service
    restart: always
    env_file:
      - .env
      - ./freight-service/.env
    depends_on:
      freight-service-database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3008/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    restart: always
    env_file:
      - ./notification-service/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      notification-service-database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ===== CAMADA 4 — GATEWAY (só sobe quando todos os serviços estão up) =====

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    depends_on:
      authentication-service:
        condition: service_started
      user-service:
        condition: service_started
      company-service:
        condition: service_started
      email-management-service:
        condition: service_started
      mapbox-service:
        condition: service_started
      swagger-service:
        condition: service_started
      storage-service:
        condition: service_started
      freight-service:
        condition: service_started
      notification-service:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  rabbitmq-data:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  authentication-service-database-data:
  user-service-database-data:
  company-service-database-data:
  storage-service-database-data:
  freight-service-database-data:
  notification-service-database-data:
  mapbox-service-database-data:

networks:
  app-network:
    driver: bridge