services:

  authentication-service:
    build: ./authentication-service
    container_name: authentication-service
    restart: always
    env_file:
      - ./authentication-service/.env
    depends_on:
      authentication-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentication-service-database:
    image: mysql:8.0
    container_name: authentication-service-database
    restart: always
    env_file:
      - ./authentication-service/.env
    volumes:
      - authentication-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    env_file:
      - ./user-service/.env
    depends_on:
      user-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service-database:
    image: mysql:8.0
    container_name: user-service-database
    restart: always
    env_file:
      - ./user-service/.env
    volumes:
      - user-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3307:3306"

  company-service:
    build: ./company-service
    container_name: company-service
    restart: always
    env_file:
      - ./company-service/.env
    depends_on:
      company-service-database:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  company-service-database:
    image: mysql:8.0
    container_name: company-service-database
    restart: always
    env_file:
      - ./company-service/.env
    volumes:
      - company-service-database-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3308:3306"

  email-management-service:
    build: ./email-management-service
    container_name: email-management-service
    restart: always
    env_file:
      - ./email-management-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mapbox-service:
    build: ./mapbox-service
    container_name: mapbox-service
    restart: always
    env_file:
      - ./mapbox-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  swagger-service:
    build: ./swagger-service
    container_name: swagger-service
    restart: always
    env_file:
      - ./swagger-service/.env
    depends_on:
      - authentication-service
      - company-service
      - user-service
    ports:
      - "3000:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    depends_on:
      - authentication-service
      - user-service
      - company-service
      - email-management-service
    volumes:
      - ./Nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  authentication-service-database-data:
  user-service-database-data: 
  company-service-database-data:
  
networks:
  app-network:
    driver: bridge